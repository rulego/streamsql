run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - gofmt
    - goimports
    - govet
    - ineffassign
    - misspell
    - gosimple
    - staticcheck
    - unused
    - typecheck
    - errcheck
    - gosec
    - gocritic
    - gocyclo
    - gofumpt
    - godot
    - goprintffuncname
    - gomodguard
    - revive

linters-settings:
  gocyclo:
    min-complexity: 15
  
  gosec:
    excludes:
      - G404 # Random number generator may not be cryptographically secure
  
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - unnamedResult
      - whyNoLint
  
  revive:
    rules:
      - name: exported
        disabled: false
        arguments:
          - "checkPrivateReceivers"
          - "sayRepetitiveInsteadOfStutters"

issues:
  exclude-rules:
    # Exclude selected checks in test files
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - gocyclo
    
    # Exclude complexity checks in CASE expression tests
    - path: streamsql_case_test\.go
      linters:
        - gocyclo
        - funlen
    
    # Exclude generated files
    - path: ".*\\.pb\\.go"
      linters:
        - all

  exclude:
    # Exclude common false positives
    - "Error return value of .((os\\.)?std(out|err)\\..*|.*Close|.*Flush|os\\.Remove(All)?|.*print.*|os\\.(Un)?Setenv). is not checked"
    - "should have a package comment"

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true 
